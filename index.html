/* ───────── Подключение к базе Supabase ─────────
   URL и publishable key — публичные значения, они и так уходят в браузер. */
const SUPABASE_URL = 'https://xncupkiiuhpcsficvnbr.supabase.co';
const SUPABASE_KEY = 'sb_publishable_JQbHRW_HEfVPsRcz47vOUw_IfadAlt5';
const sbHeaders = { apikey: SUPABASE_KEY, Authorization: 'Bearer ' + SUPABASE_KEY };

async function sb(path){
  const r = await fetch(SUPABASE_URL + '/rest/v1/' + path, { headers: sbHeaders });
  if (!r.ok) throw new Error(r.status + ' ' + (await r.text()));
  return r.json();
}

// запись в базу: POST (insert) / PATCH (update) / DELETE
async function sbw(method, path, body){
  const r = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    method,
    headers: { ...sbHeaders, 'Content-Type':'application/json', Prefer:'return=representation' },
    body: body ? JSON.stringify(body) : undefined
  });
  if (!r.ok) throw new Error(r.status + ' ' + (await r.text()));
  const t = await r.text();
  return t ? JSON.parse(t) : null;
}

// дата обновления цены -> "сегодня / вчера / N дней назад"
function relDate(ts){
  if(!ts) return '';
  const days = Math.floor((Date.now() - new Date(ts)) / 86400000);
  if (days <= 0) return 'сегодня';
  if (days === 1) return 'вчера';
  if (days < 5) return days + ' дня назад';
  return days + ' дней назад';
}

// загрузка каталога из базы в тот же формат, что ждёт приложение
let dataOk = false;
async function loadData(){
  const cats = await sb('categories?select=slug,name,emoji,sort&order=sort');
  if (cats.length) CATS = cats.map(c => ({ id:c.slug, nm:c.name, em:c.emoji }));

/* ───────── Картинка товара ─────────
   Демо: рисуем заглушку по категории материала.
   В продакшене сюда подставляется p.img — URL фото из прайса поставщика
   (поле image_url в базе / Supabase Storage). */
function matSvg(cat, color, w=400, h=300){
  const P = {
    tile:{bg:'#cdc8bd', g:'#b3ad9e'}, laminate:{bg:'#b9874c', g:'#9b6c36'},
    paint:{bg:color||'#6f9f86', g:'#00000018'}, wallpaper:{bg:'#d9c8b1', g:'#c1aa8b'},
    light:{bg:'#26292d', g:'#ffd27a'}, electric:{bg:'#edebe8', g:'#cdcac4'},
    plumbing:{bg:'#dde6ea', g:'#b9c7cf'}, doors:{bg:'#c6a473', g:'#a5824c'},
  }[cat] || {bg:'#e6e4e1', g:'#cfccc7'};
  let inner='';
  if(cat==='tile'){
    for(let y=0;y<h;y+=h/3) for(let x=0;x<w;x+=w/3)
      inner+=`<rect x="${x+3}" y="${y+3}" width="${w/3-6}" height="${h/3-6}" rx="4" fill="${P.g}" opacity="0.6"/>`;
  } else if(cat==='laminate'||cat==='doors'){
    const tones=[0.2,0.4,0.28,0.5,0.32];
    for(let i=0;i<5;i++) inner+=`<rect x="${i*(w/5)}" y="0" width="${w/5-2}" height="${h}" fill="${P.g}" opacity="${tones[i]}"/>`;
  } else if(cat==='paint'){
    inner=`<rect x="${w*0.62}" y="0" width="${w*0.38}" height="${h}" fill="#ffffff" opacity="0.18"/>`;
  } else if(cat==='wallpaper'){
    for(let y=20;y<h;y+=46) for(let x=20;x<w;x+=46) inner+=`<circle cx="${x}" cy="${y}" r="9" fill="${P.g}" opacity="0.7"/>`;
  } else if(cat==='light'){
    inner=`<circle cx="${w/2}" cy="${h*0.42}" r="34" fill="${P.g}"/><polygon points="${w/2-34},${h*0.42} ${w/2+34},${h*0.42} ${w/2+70},${h} ${w/2-70},${h}" fill="${P.g}" opacity="0.25"/>`;
  } else if(cat==='electric'){
    inner=`<rect x="${w/2-60}" y="${h/2-60}" width="120" height="120" rx="14" fill="#fff" opacity="0.9"/><circle cx="${w/2-20}" cy="${h/2}" r="9" fill="${P.g}"/><circle cx="${w/2+20}" cy="${h/2}" r="9" fill="${P.g}"/>`;
  } else if(cat==='plumbing'){
    inner=`<rect x="${w/2-8}" y="${h*0.2}" width="16" height="70" rx="6" fill="${P.g}"/><path d="M${w/2-8},${h*0.28} q-60,0 -60,60" stroke="${P.g}" stroke-width="14" fill="none" stroke-linecap="round"/>`;
  }
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="${w}" height="${h}" fill="${P.bg}"/>${inner}</svg>`;
}
function imgUrl(p){
  if (p.img) return p.img; // реальное фото из базы, когда оно есть
  return 'data:image/svg+xml;utf8,' + encodeURIComponent(matSvg(p.cat, p.color));
}

  sbw('POST', 'rpc/log_event', {

    .then(()=>{ if (type==='view') toast('✓ просмотр записан (v3)'); })

function setQty(pid, val){

  haptic();
  S.project.items = S.project.items.map(i=>i.pid===pid?{...i, qty: Math.round(n*100)/100}:i);

function persistQty(pid){
  if (!S.project.id) return; // проект ещё не создан в базе — нечего обновлять
  const item = S.project.items.find(i=>i.pid===pid);
  const req = item
    ? sbw('PATCH', `project_items?project_id=eq.${S.project.id}&product_id=eq.${pid}`, { qty: item.qty })
    : sbw('DELETE', `project_items?project_id=eq.${S.project.id}&product_id=eq.${pid}`);

}
/* ───────── Экспорт спецификации: Excel и PDF ─────────
   Библиотеки подгружаются только при первом нажатии (чтобы не тормозить запуск).
   Каждая — с запасным CDN на случай блокировки основного. */
function loadScript(src){
  return new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = src; s.onload = res; s.onerror = rej;
    document.head.appendChild(s);
  });
}
async function ensureLib(globalName, urls){
  if (window[globalName]) return true;
  for (const u of urls){
    try { await loadScript(u); if (window[globalName]) return true; } catch(e){}
  }
  return false;
}

    const best = [...p.offers].sort((a,b) => a.p - b.p)[0];
    return {
      n: i+1, name: p.name, sku: p.sku || '', supplier: best.s,
      price: best.p, qty: it.qty, unit: p.unit, sum: Math.round(best.p * it.qty * 100) / 100
    };
  });
  const total = rows.reduce((s, r) => s + r.sum, 0);
  return { rows, total };
}
const specFileName = ext =>
  ('Спецификация ' + S.project.name + ' ' + new Date().toLocaleDateString('ru-RU')).replace(/[\\/:*?"<>|·]/g,'-') + '.' + ext;

async function exportExcel(){
  if (!S.project.items.length) return toast('Подборка пуста');
  toast('Готовлю Excel…');
  const ok = await ensureLib('XLSX', [
    'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js',
    'https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js',
  ]);
  if (!ok) return toast('Модуль Excel не загрузился — проверьте связь');
  try{
    const { rows, total } = specData();
    const aoa = [
      ['Спецификация: ' + S.project.name],
      ['Дата: ' + new Date().toLocaleDateString('ru-RU') + ' · сформировано в КОМПЛЕКТ'],
      [],
      ['№','Наименование','Артикул','Поставщик','Цена, ₸','Кол-во','Ед.','Сумма, ₸'],
      ...rows.map(r => [r.n, r.name, r.sku, r.supplier, r.price, r.qty, r.unit, r.sum]),
      [],
      ['','','','','','','Итого:', total],
    ];
    const ws = XLSX.utils.aoa_to_sheet(aoa);
    ws['!cols'] = [{wch:4},{wch:52},{wch:16},{wch:20},{wch:11},{wch:8},{wch:6},{wch:13}];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Спецификация');
    XLSX.writeFile(wb, specFileName('xlsx'));
    toast('Excel сформирован — проверьте загрузки');
  }catch(e){ toast('Не получилось: ' + e.message); }
}

function sendToClient(){
  // Демо: формируем текст спецификации и отправляем через Telegram share
  const rows = S.project.items.map(it=>{
    const p = PRODUCTS.find(x=>x.id===it.pid);
    const best = [...p.offers].sort((a,b)=>a.p-b.p)[0];
    return `· ${p.name} — ${it.qty} ${p.unit} × ${fmt(best.p)} ₸ = ${fmt(best.p*it.qty)} ₸`;
  });
  const total = S.project.items.reduce((s,it)=>{
    const p = PRODUCTS.find(x=>x.id===it.pid);
    return s + [...p.offers].sort((a,b)=>a.p-b.p)[0].p*it.qty;
  },0);
  const text = `Спецификация «${S.project.name}»\n\n${rows.join('\n')}\n\nИтого: ${fmt(total)} ₸`;
  if (tg) tg.openTelegramLink('https://t.me/share/url?url=&text='+encodeURIComponent(text));
  else toast('Отправка работает внутри Telegram');
}

let toastTimer;
function toast(msg){
  clearTimeout(toastTimer);
  let t = document.querySelector('.toast');
  if (t) t.remove();
  t = document.createElement('div');
  t.className='toast'; t.innerHTML=`<div>${esc(msg)}</div>`;
  document.body.appendChild(t);
  toastTimer = setTimeout(()=>t.remove(), 1800);
}
